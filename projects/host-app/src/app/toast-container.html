@for (toast of toasts(); track toast.id) {
  <div class="toast" [class.toast--success]="toast.type === 'success'" [class.toast--error]="toast.type === 'error'">
    <i class="fa-solid" [class.fa-circle-check]="toast.type === 'success'" [class.fa-circle-exclamation]="toast.type === 'error'" [class.fa-circle-info]="toast.type === 'info'"></i>
    <span>{{ toast.message }}</span>
  </div>
}
