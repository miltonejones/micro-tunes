@if (showPanel()) {
  <div class="audio-visualizer">
    @if (castService.isConnected()) {
      <div class="audio-visualizer__cast-overlay">
        <i class="fa-solid fa-cast"></i>
        <span>Casting to {{ castService.deviceName() }}</span>
      </div>
    } @else {
      <canvas #canvasEl width="360" height="120"></canvas>
    }
  </div>
}
